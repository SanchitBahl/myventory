<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/myventory/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Myventory</title>
    <script>
      // Handle redirect from 404.html
      (function() {
        var redirect = window.location.search.match(/[?&]p=([^&]+)/);
        if (redirect) {
          var path = decodeURIComponent(redirect[1]);
          window.history.replaceState(null, null, '/myventory' + path);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
