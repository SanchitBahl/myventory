<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Myventory</title>
    <script>
      // Redirect to the app with the path encoded as a query parameter
      var path = window.location.pathname.replace('/myventory', '');
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = '/myventory/?p=' + encodeURIComponent(path + search) + hash;
      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
